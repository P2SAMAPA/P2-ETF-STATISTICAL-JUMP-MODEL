name: Daily SJM Analysis

on:
  schedule:
    - cron: "0 4 * * *"  # Daily at 04:00 UTC
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe (FI_COMMODITIES / EQUITY_SECTORS / COMBINED)"
        required: false
        default: "all"

jobs:
  run:
    name: SJM — ${{ matrix.universe }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        universe:
          - FI_COMMODITIES
          - EQUITY_SECTORS
          - COMBINED

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install numpy (pinned)
        run: pip install "numpy>=1.24.0,<2.0.0"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SJM — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SJM_UNIVERSE: ${{ matrix.universe }}
        run: python trainer.py

      - name: Print summary — ${{ matrix.universe }}
        run: |
          python3 - << 'PYEOF'
          import json, glob
          files = sorted(glob.glob("hf_cache/**/*.json", recursive=True))
          if not files:
              print("Results pushed directly to HF")
          else:
              with open(files[-1]) as f:
                  data = json.load(f)
              for uni, results in data.get("universes", {}).items():
                  print(f"\n=== {uni} ===")
                  for ticker, info in sorted(
                      results.get("tickers", {}).items(),
                      key=lambda x: x[1].get("rank", 99)
                  )[:5]:
                      print(
                          f"  #{info['rank']} {ticker}  "
                          f"Regime={info.get('current_regime_name','?')}  "
                          f"ExpRet={info.get('current_annual_return',0)*100:+.2f}%"
                      )
          PYEOF
